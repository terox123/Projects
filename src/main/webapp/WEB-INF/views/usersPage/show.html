<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" xmlns:th="http://www.w3.org/1999/xhtml">
    <title>Show</title>
</head>
<body>

<div th:if="${#lists.isEmpty(users)}">
    Users not found
</div>

<div th:each="user : ${users}">
    <a th:href="@{/users/{id}(id=${user.getId()})}" th:text="${user.getName()}" >Name</a>
</div>



</body>
</html>
