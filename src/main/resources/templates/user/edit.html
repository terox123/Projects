<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <style>
        .error { color: red; font-size: 0.9em; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; }
        input, select { padding: 5px; width: 250px; }
        .radio-group { display: inline-block; margin-right: 15px; }
        button { padding: 8px 15px; margin-top: 10px; }
    </style>
</head>
<body>
<h1>Edit User</h1>

<form th:method="POST" th:action="@{/users/{id}(id=${user.id})}" th:object="${user}">
    <input type="hidden" th:field="*{id}" />

    <div class="form-group">
        <label for="name">Full Name:</label>
        <input type="text" id="name" th:field="*{name}" required>
        <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>

    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required>
        <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    </div>

    <div class="form-group">
        <label for="dateOfBirth">Date of Birth:</label>
        <input type="date" id="dateOfBirth" name="dateOfBirth"
               th:value="${user.dateOfBirth != null ? user.getFormattedDateOfBirth() : ''}"
               required>
        <div class="error" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></div>
    </div>

    <div class="form-group">
        <label>Gender:</label>
        <div class="radio-group">
            <input type="radio" id="male" th:field="*{gender}" th:value="'MALE'">
            <label for="male">Male</label>
        </div>
        <div class="radio-group">
            <input type="radio" id="female" th:field="*{gender}" th:value="'FEMALE'">
            <label for="female">Female</label>
        </div>

        <div class="error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
    </div>

    <div class="form-group">
        <button type="submit">Update User</button>
    </div>
</form>

</body>
</html>
