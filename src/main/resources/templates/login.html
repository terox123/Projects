<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
<h2>Login Page</h2>
<form action="/login" method="post">
    <div>
        <label>Username:</label>
        <label>
            <input type="text" name="username">
        </label>
    </div>
    <div>
        <label>Password:</label>
        <label>
            <input type="password" name="password">
        </label>
    </div>
    <button type="submit">Login</button>
</form>
</body>
</html>
